<!-- User Management Section (Admin only) -->
{% if user.role == 'admin' or user.is_superuser %}
<div class="bg-gradient-to-br from-red-50 to-rose-50 dark:from-red-900/20 dark:to-rose-900/20 rounded-2xl p-6 sm:p-8 border border-red-200 dark:border-red-800/50">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 sm:gap-0 mb-8">
        <div>
            <div class="flex items-center gap-3 mb-2">
                <div class="w-12 h-12 bg-gradient-to-br from-red-500 to-rose-500 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-shield-alt text-white text-xl"></i>
                </div>
                <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white">User Management</h2>
            </div>
            <p class="text-gray-600 dark:text-gray-400 ml-0 sm:ml-15 text-sm sm:text-base">Manage system users and permissions</p>
        </div>
        <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 sm:gap-3">
            <a href="{% url 'accounts:user_list' %}" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg shadow-md hover:shadow-lg transition-all duration-200 flex items-center justify-center gap-2 font-medium text-sm sm:text-base">
                <i class="fas fa-list"></i>
                <span>View All</span>
            </a>
            <a href="{% url 'accounts:user_create' %}" class="px-4 py-2 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white rounded-lg shadow-md hover:shadow-lg transition-all duration-200 flex items-center justify-center gap-2 font-medium text-sm sm:text-base">
                <i class="fas fa-plus"></i>
                <span>Add New</span>
            </a>
        </div>
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
        <!-- System Users Card -->
        <a href="{% url 'accounts:user_list' %}" class="group relative bg-white dark:bg-gray-800 rounded-xl shadow-lg hover:shadow-2xl transition-all duration-300 overflow-hidden hover:scale-105">
            <div class="absolute inset-0 bg-gradient-to-br from-red-500/10 to-rose-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
            <div class="relative p-6 sm:p-8">
                <div class="w-16 h-16 bg-gradient-to-br from-red-500 to-rose-500 rounded-xl flex items-center justify-center shadow-lg mb-4 group-hover:scale-110 transition-transform duration-300">
                    <i class="fas fa-user-cog text-white text-2xl"></i>
                </div>
                <h3 class="text-lg sm:text-xl font-bold text-gray-900 dark:text-white mb-2">System Users</h3>
                <p class="text-gray-600 dark:text-gray-400 mb-4 text-sm sm:text-base">Manage user accounts and permissions</p>
                <div class="flex items-center text-red-600 dark:text-red-400 font-semibold group-hover:translate-x-2 transition-transform duration-300 text-sm sm:text-base">
                    <span>Browse Users</span>
                    <i class="fas fa-arrow-right ml-2"></i>
                </div>
            </div>
        </a>
        
        <!-- Admin Panel Card -->
        <a href="{% url 'admin:index' %}" class="group relative bg-white dark:bg-gray-800 rounded-xl shadow-lg hover:shadow-2xl transition-all duration-300 overflow-hidden hover:scale-105">
            <div class="absolute inset-0 bg-gradient-to-br from-slate-500/10 to-gray-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
            <div class="relative p-6 sm:p-8">
                <div class="w-16 h-16 bg-gradient-to-br from-slate-500 to-gray-600 rounded-xl flex items-center justify-center shadow-lg mb-4 group-hover:scale-110 transition-transform duration-300">
                    <i class="fas fa-cog text-white text-2xl"></i>
                </div>
                <h3 class="text-lg sm:text-xl font-bold text-gray-900 dark:text-white mb-2">Admin Panel</h3>
                <p class="text-gray-600 dark:text-gray-400 mb-4 text-sm sm:text-base">Django administration interface</p>
                <div class="flex items-center text-slate-600 dark:text-slate-400 font-semibold group-hover:translate-x-2 transition-transform duration-300 text-sm sm:text-base">
                    <span>Access Panel</span>
                    <i class="fas fa-arrow-right ml-2"></i>
                </div>
            </div>
        </a>
    </div>
</div>
{% endif %}

<!-- Flash Messages -->
{% if messages %}
<div class="messages-container mb-8">
    {% for message in messages %}
    <div class="message-popup p-4 rounded-lg shadow-lg mb-4 
        {% if message.tags == 'success' %}bg-green-50 dark:bg-green-900/30 border-l-4 border-green-500 text-green-800 dark:text-green-200
        {% elif message.tags == 'error' %}bg-red-50 dark:bg-red-900/30 border-l-4 border-red-500 text-red-800 dark:text-red-200
        {% elif message.tags == 'warning' %}bg-yellow-50 dark:bg-yellow-900/30 border-l-4 border-yellow-500 text-yellow-800 dark:text-yellow-200
        {% else %}bg-blue-50 dark:bg-blue-900/30 border-l-4 border-blue-500 text-blue-800 dark:text-blue-200{% endif %}">
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    {% if message.tags == 'success' %}
                    <i class="fas fa-check-circle text-green-500"></i>
                    {% elif message.tags == 'error' %}
                    <i class="fas fa-exclamation-circle text-red-500"></i>
                    {% elif message.tags == 'warning' %}
                    <i class="fas fa-exclamation-triangle text-yellow-500"></i>
                    {% else %}
                    <i class="fas fa-info-circle text-blue-500"></i>
                    {% endif %}
                </div>
                <div class="ml-3">{{ message }}</div>
            </div>
            <button class="message-close ml-4 flex-shrink-0 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors" type="button">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
